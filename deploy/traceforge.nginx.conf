map $uri $traceforge_cache_control {
    default "";
    /index.html "no-cache, no-store, must-revalidate";
    ~^/assets/ "public, max-age=604800, immutable";
}

limit_req_zone $binary_remote_addr zone=traceforge_api:10m rate=30r/s;

server {
    listen 80;
    server_name traceforge.axiqo.xyz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/faktura-acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name traceforge.axiqo.xyz;

    ssl_certificate /etc/letsencrypt/live/traceforge.axiqo.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/traceforge.axiqo.xyz/privkey.pem;

    root /var/www/traceforge;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; connect-src 'self'; font-src 'self' data:; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    add_header Cache-Control $traceforge_cache_control always;

    location /api/ {
        limit_req zone=traceforge_api burst=80 nodelay;
        proxy_pass http://127.0.0.1:4034;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass_header X-Accel-Buffering;
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
