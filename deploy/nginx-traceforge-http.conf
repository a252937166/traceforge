# ACME bootstrap only. Replace this whole file with traceforge.nginx.conf after
# the certificate is issued; it is not an alternate production configuration.
server {
    listen 80;
    server_name traceforge.axiqo.xyz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/faktura-acme;
    }

    location / {
        root /var/www/traceforge;
        try_files $uri $uri/ /index.html;
    }
}
